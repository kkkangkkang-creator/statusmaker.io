<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatusMaker.io — SillyTavern 상태창 빌더</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── 헤더 ── -->
<header class="app-header">
  <div class="app-logo">
    <span class="logo-icon">⚙️</span>
    <span>StatusMaker<small style="opacity:0.5">.io</small></span>
  </div>
  <div class="header-actions">
    <!-- 프로젝트 저장/불러오기 -->
    <button class="btn btn-sm" id="btnSaveProject" title="프로젝트 저장">
      💾 <span class="btn-text-hide">저장</span>
    </button>
    <button class="btn btn-sm" id="btnLoadProject" title="프로젝트 불러오기">
      📂 <span class="btn-text-hide">불러오기</span>
    </button>
    <input type="file" id="loadProjectInput" accept=".json" style="display:none">
    <!-- 다크모드 토글 -->
    <div class="theme-toggle" id="themeToggle" title="라이트/다크 전환">
      <div class="toggle-thumb">🌙</div>
    </div>
  </div>
</header>

<!-- ── 모바일 탭 ── -->
<div class="mobile-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tab="editor">✏️ 에디터</button>
    <button class="tab-btn" data-tab="preview">👁️ 미리보기</button>
  </div>
</div>

<!-- ── 메인 ── -->
<main class="app-main" data-active-tab="editor">

  <!-- 에디터 패널 -->
  <div class="editor-panel">

    <!-- 헤더 설정 섹션 -->
    <div class="editor-section open" id="sectionHeader">
      <div class="editor-section-header">
        <span class="section-icon">🎨</span>
        <span class="section-title">헤더 설정</span>
        <span class="section-arrow">▼</span>
      </div>
      <div class="editor-section-body">
        <div class="form-group">
          <label class="form-label">캐릭터 이름 변수</label>
          <input class="form-input" id="cfgCharName" value="{{user}}" placeholder="{{user}} 또는 이름">
          <div class="form-hint">SillyTavern 매크로: {{user}}, {{char}} 등</div>
        </div>
        <div class="form-group">
          <label class="form-label">프로필 이미지</label>
          <label class="form-check">
            <input type="checkbox" id="cfgShowProfile" checked>
            프로필 이미지 표시
          </label>
        </div>
      </div>
    </div>

    <!-- ★ 테마 섹션 제거됨 ★ -->

    <!-- 필드 관리 섹션 -->
    <div class="editor-section open" id="sectionFields">
      <div class="editor-section-header">
        <span class="section-icon">📋</span>
        <span class="section-title">필드 관리</span>
        <span class="section-arrow">▼</span>
      </div>
      <div class="editor-section-body">
        <!-- 필드 추가 버튼 그리드 -->
        <div class="add-field-grid" id="addFieldGrid"></div>
        <!-- 필드 목록 -->
        <div class="field-list" id="fieldList">
          <div class="empty-state" id="emptyFields">
            <div class="empty-icon">📭</div>
            <div class="empty-text">필드가 없습니다</div>
            <div class="empty-hint">위 버튼으로 필드를 추가하세요</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 내보내기 섹션 -->
    <div class="editor-section" id="sectionExport">
      <div class="editor-section-header">
        <span class="section-icon">📦</span>
        <span class="section-title">내보내기</span>
        <span class="section-arrow">▼</span>
      </div>
      <div class="editor-section-body">
        <div class="form-group">
          <label class="form-label">스크립트 이름</label>
          <input class="form-input" id="cfgScriptName" value="⚙️ 상태창" placeholder="스크립트 이름">
        </div>
        <div class="form-group">
          <label class="form-label">구분자 형식</label>
          <select class="form-select" id="cfgSeparator">
            <option value="|">| (파이프) — Key=Value|Key=Value</option>
            <option value="newline">줄바꿈 — Key:Value per line</option>
          </select>
          <div class="form-hint">SillyTavern &lt;status&gt; 태그 안의 데이터 형식</div>
        </div>
        <div class="form-group">
          <label class="form-label">Regex 적용 위치</label>
          <div class="form-row">
            <label class="form-check">
              <input type="checkbox" id="cfgPlaceAI" checked> AI 출력
            </label>
            <label class="form-check">
              <input type="checkbox" id="cfgPlaceUser"> 유저 입력
            </label>
          </div>
        </div>
        <div class="export-actions">
          <button class="btn btn-primary" id="btnExportJSON">
            <i class="fa-solid fa-download"></i> SillyTavern JSON 다운로드
          </button>
          <button class="btn btn-success" id="btnCopyRegex">
            <i class="fa-solid fa-copy"></i> Regex 복사
          </button>
          <button class="btn" id="btnCopyHTML">
            <i class="fa-solid fa-code"></i> HTML만 복사
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- 미리보기 패널 -->
  <div class="preview-panel">
    <div class="preview-wrapper">
      <div class="preview-label">실시간 미리보기</div>
      <div class="preview-frame">
        <div class="preview-html" id="previewHtml"></div>
      </div>
    </div>
  </div>

</main>

<!-- 토스트 컨테이너 -->
<div class="toast-container" id="toastContainer"></div>

<!-- JS (순서 중요: utils → themes → fields → preview → export → app) -->
<script src="js/utils.js"></script>
<script src="js/themes.js"></script>
<script src="js/fields.js"></script>
<script src="js/preview.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
